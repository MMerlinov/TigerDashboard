<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>TIGER CRM | Настройки профиля</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-grad-1: #050505; --bg-grad-2: #0a0a20;
            --panel-bg: rgba(30, 30, 35, 0.75); 
            --text-main: #ffffff; --text-muted: #aaaaaa; 
            --border-color: rgba(255,255,255,0.1); 
            --input-bg: rgba(20, 20, 25, 0.8); 
            --input-border: #3e3e42; 
        }
        [data-theme="light"] { 
            --bg-grad-1: #f5f7fa; --bg-grad-2: #e4e8f0; 
            --panel-bg: rgba(255, 255, 255, 0.85); 
            --text-main: #222222; --text-muted: #555555; 
            --border-color: rgba(0,0,0,0.1); 
            --input-bg: rgba(240, 240, 240, 0.8); 
            --input-border: #cccccc; 
        }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text-main); transition: all 0.3s ease; }
        .profile-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .profile-card { background: var(--panel-bg); backdrop-filter: blur(25px); border: 1px solid var(--border-color); border-radius: 24px; padding: 35px; width: 100%; box-shadow: 0 15px 45px rgba(0,0,0,0.6); box-sizing: border-box; }
        
        h2 { font-family: 'Montserrat', sans-serif; font-size: 1.9rem; color: #0078d7; margin-top: 0; margin-bottom: 25px; text-align: center; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,120,215,0.2); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="number"] { padding: 12px 14px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 12px; font-size: 1rem; transition: 0.3s; width: 100%; box-sizing: border-box; }
        input:focus { outline: none; border-color: #0078d7; box-shadow: 0 0 10px rgba(0,120,215,0.4); background: rgba(0,0,0,0.3); }
        input[type="file"] { color: var(--text-muted); font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        input[type="color"] { cursor: pointer; border: none; border-radius: 8px; background: transparent; padding: 0; height: 44px; width: 100%; transition: transform 0.2s; }
        input[type="color"]:hover { transform: scale(1.05); }
        
        .avatar-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; position: relative; }
        .avatar-preview { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #0078d7; background: #111; display: none; box-shadow: 0 5px 20px rgba(0,120,215,0.4); transition: transform 0.3s; }
        .avatar-preview:hover { transform: scale(1.05); }
        
        .days-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .days-grid input { text-align: center; font-weight: bold; }
        
        .chart-panel { background: var(--panel-bg); backdrop-filter: blur(25px); border: 1px solid var(--border-color); border-radius: 24px; padding: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.6); width: 100%; box-sizing: border-box; }

        .btn-save { width: 100%; background: linear-gradient(135deg, #107c10, #0b590b); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save:hover { box-shadow: 0 5px 20px rgba(16,124,16,0.5); transform: translateY(-2px); }
        .btn-save:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-back { width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: 0.3s; margin-top: 10px; text-align: center; }
        .btn-back:hover { background: rgba(255,255,255,0.07); color: var(--text-main); }
        
        .status-msg { font-size: 0.95rem; text-align: center; margin-top: 15px; font-weight: 600; min-height: 22px; transition: 0.3s; }
        .section-title { color: #0078d7; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 35px; margin-bottom: 18px; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-card">
            <h2>Профиль сотрудника</h2>
            
            <div class="avatar-container">
                <img id="avatarPreview" class="avatar-preview" src="" alt="Аватар">
                <div class="form-group" style="width: 100%; text-align: center;">
                    <label style="margin-bottom: 5px; display: block;">Фото профиля (Max: 2MB)</label>
                    <input type="file" id="avatarFile" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="empName" placeholder="Введите имя для таблицы">
            </div>

            <h3 class="section-title">Визуальная идентификация</h3>
            <div class="form-group">
                <label>Твой цвет (видно всем)</label>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <input type="color" id="personalColor" value="#0078d7" style="width: 60px; height: 50px;">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Этот цвет выделит тебя в глобальном рейтинге и графиках.</span>
                </div>
            </div>

            <h3 class="section-title">Дизайн интерфейса (локально)</h3>
            <div class="days-grid" style="grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Фон (Град. 1)</label><input type="color" id="themeBg1" value="#050505" oninput="previewTheme()"></div>
                <div class="form-group"><label>Фон (Град. 2)</label><input type="color" id="themeBg2" value="#0a0a20" oninput="previewTheme()"></div>
                <div class="form-group"><label>Текст</label><input type="color" id="themeText" value="#ffffff" oninput="previewTheme()"></div>
                <div class="form-group"><label>Панели (RGBA)</label><input type="text" id="themePanel" placeholder="rgba(30, 30, 35, 0.75)" oninput="previewTheme()"></div>
            </div>

            <h3 class="section-title">Базовые данные (Дни)</h3>
            <div class="days-grid">
                <input type="number" id="day_mon" placeholder="ПН" title="Понедельник">
                <input type="number" id="day_tue" placeholder="ВТ" title="Вторник">
                <input type="number" id="day_wed" placeholder="СР" title="Среда">
                <input type="number" id="day_thu" placeholder="ЧТ" title="Четверг">
                <input type="number" id="day_fri" placeholder="ПТ" title="Пятница">
                <input type="number" id="day_sat" placeholder="СБ" title="Суббота">
            </div>

            <button id="saveBtn" class="btn-save" onclick="saveProfile()">Сохранить изменения</button>
            <button class="btn-back" onclick="window.location.href='index.html'">← Вернуться на Дашборд</button>
            <div id="statusMsg" class="status-msg"></div>
        </div>

        <div class="chart-panel">
            <label style="display:block; text-align:center; margin-bottom:15px; font-weight:bold; color:var(--text-muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px;">Моя статистика VS Отдел</label>
            <div style="height: 220px;"><canvas id="compareChart"></canvas></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://geolvowpvdxnimypcvfx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NYYVxFGX8ZnVK0CyEFPehg_z58eWBut"; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUsername = localStorage.getItem('crm_username') || '';
        let base64AvatarString = ""; 
        let currentEmployeeId = null;
        let compareChartInst = null;

        if (localStorage.getItem('crm_theme') === 'light') { document.documentElement.setAttribute('data-theme', 'light'); }

        function previewTheme() {
            document.body.style.background = `linear-gradient(135deg, ${document.getElementById('themeBg1').value}, ${document.getElementById('themeBg2').value})`;
            document.body.style.color = document.getElementById('themeText').value;
        }

        document.getElementById('avatarFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const msgEl = document.getElementById('statusMsg');
            if (file) {
                if (file.size > 2 * 1024 * 1024) { 
                    msgEl.style.color = '#ff4d4d';
                    msgEl.innerText = "Файл слишком большой! Максимум 2 МБ.";
                    this.value = ""; return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64AvatarString = event.target.result;
                    const preview = document.getElementById('avatarPreview');
                    preview.src = base64AvatarString;
                    preview.style.display = 'block';
                    msgEl.innerText = "";
                };
                reader.readAsDataURL(file);
            }
        });

        async function loadProfileData() {
            if (!currentUsername) { window.location.href = 'login.html'; return; }
            
            let { data: allEmp } = await db.from('employees').select('*');
            let { data: emp } = await db.from('employees').select('*').eq('name', currentUsername).maybeSingle();
            
            let myDays = [0,0,0,0,0,0];
            let personalColor = '#0078d7';

            if (emp) {
                currentEmployeeId = emp.id;
                document.getElementById('empName').value = emp.name || '';
                document.getElementById('day_mon').value = emp.mon || 0;
                document.getElementById('day_tue').value = emp.tue || 0;
                document.getElementById('day_wed').value = emp.wed || 0;
                document.getElementById('day_thu').value = emp.thu || 0;
                document.getElementById('day_fri').value = emp.fri || 0;
                document.getElementById('day_sat').value = emp.sat || 0;
                
                document.getElementById('personalColor').value = emp.personal_color || '#0078d7';
                personalColor = emp.personal_color || '#0078d7';

                if (emp.custom_theme) {
                    const theme = typeof emp.custom_theme === 'string' ? JSON.parse(emp.custom_theme) : emp.custom_theme;
                    document.getElementById('themeBg1').value = theme.bgGrad1 || '#050505';
                    document.getElementById('themeBg2').value = theme.bgGrad2 || '#0a0a20';
                    document.getElementById('themeText').value = theme.textMain || '#ffffff';
                    document.getElementById('themePanel').value = theme.panelBg || 'rgba(30, 30, 35, 0.75)';
                    previewTheme();
                }
                
                myDays = [emp.mon||0, emp.tue||0, emp.wed||0, emp.thu||0, emp.fri||0, emp.sat||0];

                if (emp.avatar_url) {
                    base64AvatarString = emp.avatar_url;
                    const preview = document.getElementById('avatarPreview');
                    preview.src = base64AvatarString;
                    preview.style.display = 'block';
                }
            } else { document.getElementById('empName').value = currentUsername; }

            generateCompareChart(myDays, allEmp || [], personalColor);
        }

        function generateCompareChart(myDays, allEmployees, myColor) {
            let avgDays = [0,0,0,0,0,0];
            let count = allEmployees.length;
            
            if(count > 0) {
                allEmployees.forEach(e => {
                    avgDays[0] += e.mon || 0; avgDays[1] += e.tue || 0; avgDays[2] += e.wed || 0;
                    avgDays[3] += e.thu || 0; avgDays[4] += e.fri || 0; avgDays[5] += e.sat || 0;
                });
                avgDays = avgDays.map(v => Math.round((v / count) * 10) / 10);
            }

            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            const txtColor = isDark ? '#aaaaaa' : '#555555';

            const ctx = document.getElementById('compareChart').getContext('2d');
            compareChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'],
                    datasets: [
                        { label: 'Я', data: myDays, backgroundColor: myColor, borderRadius: 6 },
                        { label: 'Среднее Бюро', data: avgDays, backgroundColor: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)', borderRadius: 6 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: txtColor } } },
                    scales: {
                        x: { ticks: { color: txtColor }, grid: { display: false } },
                        y: { ticks: { color: txtColor }, grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } }
                    }
                }
            });
        }

        async function saveProfile() {
            const pass = prompt("Запрос разрешения администратора. Введите пароль для внесения изменений:");
            if (pass !== "0402") {
                const msgEl = document.getElementById('statusMsg');
                msgEl.style.color = '#ff4d4d';
                msgEl.innerText = "Отказано в доступе: Неверный пароль администратора.";
                return;
            }

            const msgEl = document.getElementById('statusMsg');
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('empName').value.trim();
            
            if(!name) { msgEl.style.color = '#ff4d4d'; msgEl.innerText = "Имя не может быть пустым!"; return; }

            btn.disabled = true;
            btn.innerText = "Синхронизация...";
            msgEl.style.color = '#0078d7';
            msgEl.innerText = "Сохранение данных в облаке Supabase...";

            const themeSettings = {
                bgGrad1: document.getElementById('themeBg1').value,
                bgGrad2: document.getElementById('themeBg2').value,
                textMain: document.getElementById('themeText').value,
                panelBg: document.getElementById('themePanel').value
            };

            const payload = {
                name: name,
                mon: parseInt(document.getElementById('day_mon').value) || 0,
                tue: parseInt(document.getElementById('day_tue').value) || 0,
                wed: parseInt(document.getElementById('day_wed').value) || 0,
                thu: parseInt(document.getElementById('day_thu').value) || 0,
                fri: parseInt(document.getElementById('day_fri').value) || 0,
                sat: parseInt(document.getElementById('day_sat').value) || 0,
                avatar_url: base64AvatarString,
                personal_color: document.getElementById('personalColor').value,
                custom_theme: themeSettings
            };

            localStorage.setItem('crm_custom_theme', JSON.stringify(themeSettings));
            await db.from('system_users').update({ username: name }).eq('username', currentUsername);

            let result;
            if (currentEmployeeId) {
                result = await db.from('employees').update(payload).eq('id', currentEmployeeId);
            } else {
                // РЕШЕНИЕ ОШИБКИ: Вычисляем максимальный id перед вставкой, чтобы избежать ошибки Not-Null Constraint
                const { data: maxEmp } = await db.from('employees').select('id').order('id', { ascending: false }).limit(1).maybeSingle();
                const nextId = maxEmp ? maxEmp.id + 1 : 1;
                payload.id = nextId;
                result = await db.from('employees').insert([payload]);
            }

            if (result.error) {
                console.error(result.error);
                msgEl.style.color = '#ff4d4d';
                msgEl.innerText = "Ошибка сохранения: " + result.error.message;
                btn.disabled = false;
                btn.innerText = "Сохранить изменения";
            } else {
                localStorage.setItem('crm_username', name);
                msgEl.style.color = '#107c10';
                msgEl.innerText = "Успешно сохранено! Возврат на главную...";
                setTimeout(() => { window.location.href = 'index.html'; }, 1200);
            }
        }

        window.onload = loadProfileData;
    </script>
</body>
</html>
