<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIGR-CRM | Архив Недель</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --accent-color: #0078d7;
            --accent-hover: #005a9e;
            --success: #27ae60;
        }
        body {
            margin: 0; padding: 20px; font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); padding: 15px 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px;
        }
        .header h1 { margin: 0; color: var(--accent-color); font-weight: 800; }
        .btn-back {
            background: transparent; border: 2px solid var(--accent-color);
            color: var(--accent-color); padding: 10px 20px; border-radius: 8px;
            cursor: pointer; text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .btn-back:hover { background: var(--accent-color); color: #fff; }
        .archive-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .week-list { background: var(--panel-bg); border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .week-item {
            padding: 15px; background: rgba(0, 120, 215, 0.1); border: 1px solid var(--accent-color);
            border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s ease;
            font-weight: 600; text-align: center;
        }
        .week-item:hover, .week-item.active {
            background: var(--accent-color); color: #fff; transform: translateY(-2px);
        }
        .viewer-panel { background: var(--panel-bg); border-radius: 12px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; text-align: center; }
        th { color: #aaa; text-transform: uppercase; font-size: 0.9rem; }
        .total-badge {
            display: inline-block; padding: 10px 20px; background: rgba(39, 174, 96, 0.2);
            color: var(--success); border-radius: 8px; font-size: 1.2rem; font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>TIGR-CRM | АРХИВ НЕДЕЛЬ</h1>
        <a href="index.html" class="btn-back">⬅ Вернуться в Дашборд</a>
    </div>

    <div class="archive-grid">
        <div class="week-list" id="weekList">
            <div style="text-align: center; color: #888;">Загрузка архивов...</div>
        </div>
        <div class="viewer-panel" id="viewerPanel">
            <h2 style="margin-top: 0; color: #888; text-align: center;">Выберите неделю слева для просмотра статистики</h2>
            <div id="archiveContent"></div>
        </div>
    </div>

    <script>
        // ВАЖНО: Вставьте ваши ключи Supabase
        const SUPABASE_URL = "https://geolvowpvdxnimypcvfx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NYYVxFGX8ZnVK0CyEFPehg_z58eWBut"; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let archives = [];

        async function loadArchives() {
            const { data, error } = await db.from('weekly_archives').select('*').order('created_at', { ascending: false });
            if (error) { console.error("Ошибка загрузки архивов:", error); return; }
            archives = data;
            
            const list = document.getElementById('weekList');
            list.innerHTML = '';
            
            if(archives.length === 0) { 
                list.innerHTML = '<div style="color: #888; text-align: center; padding: 20px;">Архивов пока нет</div>'; 
                return; 
            }

            archives.forEach((arc, idx) => {
                const btn = document.createElement('div');
                btn.className = 'week-item';
                btn.innerText = arc.week_dates;
                btn.onclick = () => {
                    document.querySelectorAll('.week-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderArchive(idx);
                };
                list.appendChild(btn);
            });
        }

        function renderArchive(index) {
            const data = archives[index];
            const content = document.getElementById('archiveContent');
            let empHtml = '';
            let totalSum = 0;
            
            data.employees_data.forEach(emp => {
                let sum = emp.days.reduce((a, b) => a + (b || 0), 0);
                totalSum += sum;
                const nameColor = emp.personal_color || '#0078d7';
                
                empHtml += `<tr>
                    <td style="text-align: left; color: ${nameColor}; font-weight: bold;">${emp.name}</td>
                    ${emp.days.map(d => `<td>${d || 0}</td>`).join('')}
                    <td style="color: var(--success); font-weight: bold;">${sum}</td>
                </tr>`;
            });

            // Восстановление логики расчета Каменского из сохраненных метрик
            const kamenskoe = (data.global_metrics.total || 0) - ((data.global_metrics.nikopol || 0) + (data.global_metrics.zv || 0));

            content.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
                    <h2 style="color: var(--accent-color); margin: 0;">${data.week_dates}</h2>
                    <div class="total-badge">Итого за неделю: ${totalSum}</div>
                </div>
                
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div style="background: #2a2a2a; padding: 10px 15px; border-radius: 8px;">Никополь: <b>${data.global_metrics.nikopol || 0}</b></div>
                    <div style="background: #2a2a2a; padding: 10px 15px; border-radius: 8px;">ЖВ: <b>${data.global_metrics.zv || 0}</b></div>
                    <div style="background: #2a2a2a; padding: 10px 15px; border-radius: 8px;">Каменское: <b style="color: #f39c12;">${kamenskoe > 0 ? kamenskoe : 0}</b></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th style="text-align: left;">Сотрудник</th>
                            <th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th>
                            <th style="color: var(--success);">ИТОГ</th>
                        </tr>
                    </thead>
                    <tbody>${empHtml}</tbody>
                </table>
            `;
        }

        window.onload = loadArchives;
    </script>
</body>
</html>
