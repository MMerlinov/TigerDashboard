<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TIGR CRM | Cloud Metro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #1e1e1e; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .dashboard-container { padding: 30px 40px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .header h1 { font-weight: 300; font-size: 2.2rem; margin: 0; letter-spacing: 1px; color: #0078d7; }
        .content-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background-color: #2d2d30; padding: 20px; display: flex; flex-direction: column; min-height: 380px; }
        .panel-title { font-size: 1.1rem; color: #ccc; margin-top: 0; margin-bottom: 20px; font-weight: 400; border-bottom: 1px solid #3e3e42; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: #888; font-weight: normal; font-size: 0.8rem; padding: 8px 5px; border-bottom: 2px solid #3e3e42; text-align: center; }
        th:first-child, th:nth-child(2) { text-align: left; }
        td { padding: 8px 5px; border-bottom: 1px solid #3e3e42; font-size: 0.95rem; text-align: center; vertical-align: middle; }
        td:first-child, td:nth-child(2) { text-align: left; }
        
        .user-id { color: #0078d7; font-family: monospace; font-size: 0.9rem; }
        .cell-input { width: 45px; padding: 5px; background: #1e1e1e; border: 1px solid #3e3e42; color: white; text-align: center; border-radius: 2px; }
        .cell-input:focus { border-color: #0078d7; outline: none; }
        .cell-input:disabled { background: #2a2a2a; color: #888; border-color: #2a2a2a; cursor: not-allowed; }
        .cell-total { font-weight: bold; color: #107c10; }
        
        .btn-delete { background-color: #d13438; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 2px; font-size: 0.8rem; }
        .btn-delete:hover { background-color: #a80000; }

        .chart-container { position: relative; width: 100%; height: 210px; display: flex; justify-content: center; align-items: flex-end; }
        .custom-legend { display: flex; justify-content: center; flex-wrap: nowrap; gap: 12px; margin-top: 25px; font-size: 0.85rem; border-top: 1px solid #3e3e42; padding-top: 15px; }
        .legend-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; color: #aaa; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
        .legend-value { color: #ffffff; font-weight: bold; }

        .admin-toggle-btn { width: 100%; padding: 15px; background: #252526; color: #888; border: 1px dashed #444; cursor: pointer; text-align: center; transition: 0.3s; font-size: 1rem; }
        .admin-toggle-btn:hover { background: #333; color: #fff; border-color: #0078d7; }

        .admin-panel { background-color: #2d2d30; padding: 20px; border-left: 5px solid #d13438; display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .admin-section { flex: 1; min-width: 250px; }
        .admin-section h3 { margin-top: 0; font-weight: 400; color: #ccc; font-size: 1.1rem; border-bottom: 1px solid #3e3e42; padding-bottom: 10px; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .input-group label { font-size: 0.9rem; color: #aaa; }
        .input-group input { width: 100px; padding: 8px; background: #1e1e1e; border: 1px solid #3e3e42; color: white; text-align: right; }
        
        .btn-metro { background-color: #0078d7; color: white; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-metro:hover { background-color: #005a9e; }
        .btn-add { background-color: #107c10; }
        .btn-add:hover { background-color: #0b580b; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: #2d2d30; padding: 30px; width: 300px; border-top: 4px solid #0078d7; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content input { width: 100%; padding: 10px; margin: 15px 0; background: #1e1e1e; border: 1px solid #3e3e42; color: white; box-sizing: border-box; text-align: center; font-size: 1.2rem; letter-spacing: 5px; }
        
        .hidden { display: none !important; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #1e1e1e; display:flex; justify-content:center; align-items:center; z-index:9999; font-size:1.5rem; font-weight:300; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">Загрузка данных...</div>

    <div class="dashboard-container">
        <div class="header"><h1>World Wide CRM</h1></div>

        <div class="content-grid">
            <div class="panel">
                <h3 class="panel-title">Реестр сотрудников и данные</h3>
                <table>
                    <thead>
                        <tr id="tableHeader">
                            <th>Номер</th><th>Имя</th><th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th><th>Общ</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody"></tbody>
                </table>
            </div>

            <div class="panel">
                <h3 class="panel-title">Распределение данных</h3>
                <div class="chart-container"><canvas id="gaugeChart"></canvas></div>
                <div id="gaugeLegend" class="custom-legend"></div>
            </div>

            <div class="panel">
                <h3 class="panel-title">Лидеры по данным</h3>
                <div class="chart-container" style="height: 270px;"><canvas id="barChart"></canvas></div>
            </div>
        </div>

        <div id="adminModeBtn" class="admin-toggle-btn" onclick="openPinModal()">[ Включить Admin-Mode ]</div>

        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-section">
                <h3>Глобальные данные</h3>
                <div class="input-group">
                    <label>Общее количество:</label>
                    <input type="number" id="globalTotal" onchange="uploadGlobalMetrics()">
                </div>
                <div class="input-group">
                    <label>Жёлтые Воды:</label>
                    <input type="number" id="globalZV" onchange="uploadGlobalMetrics()">
                </div>
                <div class="input-group">
                    <label>Никополь:</label>
                    <input type="number" id="globalNikopol" onchange="uploadGlobalMetrics()">
                </div>
                <div class="input-group" style="background: rgba(255,255,255,0.05); padding: 5px;">
                    <label style="color: #fff; font-weight: bold;">Каменка (Авто):</label>
                    <span id="globalKamenka" style="font-weight: bold; color: #f39c12;">0</span>
                </div>
            </div>

            <div class="admin-section">
                <h3>Управление сотрудниками</h3>
                <div class="input-group"><label>ID (NK_User#):</label><input type="text" id="newEmpId" placeholder="007"></div>
                <div class="input-group"><label>Имя:</label><input type="text" id="newEmpName" placeholder="Иван И."></div>
                <button class="btn-metro btn-add" onclick="addEmployee()">+ ДОБАВИТЬ СОТРУДНИКА</button>
            </div>
        </div>
    </div>

    <div id="pinModal" class="modal">
        <div class="modal-content">
            <h3>Вход в Admin-Mode</h3>
            <input type="password" id="adminPin" placeholder="****" maxlength="4">
            <button class="btn-metro" onclick="checkPin()">ПОДТВЕРДИТЬ</button>
            <button class="btn-metro" style="background: #444; margin-top: 5px;" onclick="closePinModal()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        // === НАСТРОЙКА ПОДКЛЮЧЕНИЯ SUPABASE ===
        const SUPABASE_URL = "https://geolvowpvdxnimypcvfx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NYYvXFGX8ZnVK0CyEFPehg_z58eWBut";

        // Инициализируем клиент под именем db
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isAdmin = false;
        let employees = [];
        let gaugeChartInst = null;
        let barChartInst = null;
        const dbDaysKeys = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        Chart.defaults.color = '#aaaaaa';
        Chart.defaults.font.family = "'Segoe UI', sans-serif";

        async function loadCloudData() {
            let { data: metrics } = await db.from('global_metrics').select('*').eq('id', 1).single();
            if (metrics) {
                document.getElementById('globalTotal').value = metrics.total;
                document.getElementById('globalZV').value = metrics.zv;
                document.getElementById('globalNikopol').value = metrics.nikopol;
            }
            let { data: dbEmployees } = await db.from('employees').select('*').order('created_at', { ascending: true });
            if (dbEmployees) {
                employees = dbEmployees.map(emp => ({
                    id: emp.id, name: emp.name, days: [emp.mon, emp.tue, emp.wed, emp.thu, emp.fri, emp.sat]
                }));
            }
            document.getElementById('loading').style.display = 'none';
            calculateKamenka(false); 
            renderTable();
        }

        async function uploadGlobalMetrics() {
            const total = parseInt(document.getElementById('globalTotal').value) || 0;
            const zv = parseInt(document.getElementById('globalZV').value) || 0;
            const nikopol = parseInt(document.getElementById('globalNikopol').value) || 0;
            calculateKamenka(true);
            await db.from('global_metrics').update({ total, zv, nikopol }).eq('id', 1);
        }

        function calculateKamenka(shouldUpdateCharts = true) {
            const total = parseInt(document.getElementById('globalTotal').value) || 0;
            const zv = parseInt(document.getElementById('globalZV').value) || 0;
            const nikopol = parseInt(document.getElementById('globalNikopol').value) || 0;
            let kamenka = Math.max(0, total - (nikopol + zv));
            document.getElementById('globalKamenka').innerText = kamenka;
            if(shouldUpdateCharts && gaugeChartInst) {
                gaugeChartInst.data.datasets[0].data = [total, zv, kamenka, nikopol];
                gaugeChartInst.update();
                updateCustomLegend(total, zv, kamenka, nikopol);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = '';
            employees.forEach((emp, index) => {
                let totalMonFri = emp.days.slice(0, 5).reduce((a, b) => a + b, 0);
                let disabledAttr = isAdmin ? '' : 'disabled';
                let tr = document.createElement('tr');
                let html = `<td class="user-id">${emp.id}</td><td>${emp.name}</td>` + 
                    emp.days.map((val, dayIdx) => `<td><input type="number" class="cell-input" value="${val}" onchange="updateEmpDayInCloud(${index}, ${dayIdx}, this.value)" ${disabledAttr}></td>`).join('') +
                    `<td class="cell-total" id="total_${index}">${totalMonFri}</td>`;
                if (isAdmin) html += `<td><button class="btn-delete" onclick="deleteEmployee('${emp.id}', ${index})">✕</button></td>`;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
            updateLeaderboard();
        }

        async function updateEmpDayInCloud(empIndex, dayIndex, value) {
            const intVal = parseInt(value) || 0;
            employees[empIndex].days[dayIndex] = intVal;
            document.getElementById(`total_${empIndex}`).innerText = employees[empIndex].days.slice(0, 5).reduce((a, b) => a + b, 0);
            updateLeaderboard();
            await db.from('employees').update({ [dbDaysKeys[dayIndex]]: intVal }).eq('id', employees[empIndex].id);
        }

        async function addEmployee() {
    const idVal = document.getElementById('newEmpId').value, nameVal = document.getElementById('newEmpName').value;
    if(!idVal || !nameVal) return alert('Введите данные!');
    const fullId = `NK_User#${idVal}`;
    
    // ВАЖНО: Добавьте деструктуризацию ответа, чтобы увидеть ошибку в консоли
    const { data, error } = await db.from('employees').insert([{ id: fullId, name: nameVal }]);
    
    if (error) {
        console.error("Ошибка при вставке:", error); // ЭТО ВАЖНО
        alert("Ошибка базы данных: " + error.message);
        return;
    }
    
    employees.push({ id: fullId, name: nameVal, days: [0, 0, 0, 0, 0, 0] });
    renderTable();
}

        async function deleteEmployee(id, index) {
            if(confirm('Удалить?')) {
                await db.from('employees').delete().eq('id', id);
                employees.splice(index, 1);
                renderTable();
            }
        }

        function initCharts() {
            gaugeChartInst = new Chart(document.getElementById('gaugeChart'), {
                type: 'doughnut', data: { labels: ['Общие', 'ЖВ', 'Каменка', 'Никополь'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#444','#f1c40f','#e67e22','#3498db'] }] },
                options: { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, plugins: { legend: { display: false } } }
            });
            barChartInst = new Chart(document.getElementById('barChart'), {
                type: 'bar', data: { labels: [], datasets: [{ label: 'Объем', data: [], backgroundColor: '#107c10' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        function updateCustomLegend(t, z, k, n) {
            document.getElementById('gaugeLegend').innerHTML = [
                {t:'Общие',v:t,c:'#444'}, {t:'ЖВ',v:z,c:'#f1c40f'}, {t:'Каменка',v:k,c:'#e67e22'}, {t:'Никополь',v:n,c:'#3498db'}
            ].map(i => `<div class="legend-item"><span class="legend-color" style="background:${i.c}"></span>${i.t}: <b>${i.v}</b></div>`).join('');
        }

        function updateLeaderboard() {
            if(!barChartInst) return;
            barChartInst.data.labels = employees.map(e => e.name);
            barChartInst.data.datasets[0].data = employees.map(e => e.days.slice(0, 5).reduce((a, b) => a + b, 0));
            barChartInst.update();
        }

        function openPinModal() { document.getElementById('pinModal').style.display = 'flex'; }
        function closePinModal() { document.getElementById('pinModal').style.display = 'none'; }
        
        function checkPin() {
            if (document.getElementById('adminPin').value === '0402') {
                isAdmin = true; closePinModal();
                document.getElementById('adminModeBtn').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderTable();
            } else alert('Неверно!');
        }

        window.onload = async () => { initCharts(); await loadCloudData(); };
    </script>
</body>
</html>
