<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>TIGER CRM | Cloud Metro Dashboard</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041883.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root { --bg-grad-1: #050505; --bg-grad-2: #0a0a20; --bg-grad-3: #0d1a12; --bg-grad-4: #1a0a1a; --panel-bg: rgba(45, 45, 48, 0.85); --text-main: #ffffff; --text-muted: #aaaaaa; --border-color: rgba(255,255,255,0.05); --input-bg: rgba(30, 30, 30, 0.8); --input-border: #3e3e42; --hover-row: rgba(0, 120, 215, 0.15); --shadow: 0 8px 32px rgba(0,0,0,0.5); }
        [data-theme="light"] { --bg-grad-1: #f5f7fa; --bg-grad-2: #e4e8f0; --bg-grad-3: #dcedc8; --bg-grad-4: #e1bee7; --panel-bg: rgba(255, 255, 255, 0.85); --text-main: #222222; --text-muted: #555555; --border-color: rgba(0,0,0,0.1); --input-bg: rgba(240, 240, 240, 0.9); --input-border: #cccccc; --hover-row: rgba(0, 120, 215, 0.08); --shadow: 0 8px 32px rgba(0,0,0,0.1); }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: transparent; font-size: 14px; color: var(--text-main); transition: color 0.4s ease; }
        
        #tsparticles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; transition: background 0.5s ease; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .dashboard-container { padding: 15px 25px; position: relative; z-index: 2; max-width: 1600px; margin: 0 auto; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .header h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 2.2rem; margin: 0; color: #0078d7; text-shadow: 0 4px 10px rgba(0, 120, 215, 0.3); }
        .user-badge { display: flex; align-items: center; gap: 15px; background: var(--panel-bg); padding: 6px 20px; border-radius: 30px; border: 1px solid var(--border-color); }
        .btn-theme { background: transparent; border: 1px solid var(--border-color); font-size: 1.2rem; cursor: pointer; padding: 5px 10px; border-radius: 50%; color: var(--text-main); }
        .btn-logout { background: #d13438; border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .content-grid { display: grid; grid-template-columns: 65% 35%; gap: 20px; margin-bottom: 20px; }
        .col-left, .col-right { display: flex; flex-direction: column; gap: 20px; }
        
        .panel { background-color: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
        .panel-title { font-size: 1.1rem; color: var(--text-muted); margin-top: 0; margin-bottom: 15px; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
        th { color: var(--text-muted); font-size: 0.8rem; padding: 10px 4px; border-bottom: 2px solid var(--input-border); text-align: center; }
        th:first-child, th:nth-child(2) { text-align: left; }
        td { padding: 6px 4px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; text-align: center; vertical-align: middle; }
        .cell-input { width: 100%; max-width: 45px; padding: 6px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); text-align: center; border-radius: 6px; }
        .cell-input:disabled { background: transparent; border: none; font-weight: bold; -webkit-appearance: none; }
        
        /* Светофор */
        .traffic-light { width: 16px; height: 16px; border-radius: 50%; margin: 0 auto; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: 0.3s; }
        .tl-green { background-color: #107c10; box-shadow: 0 0 10px rgba(16, 124, 16, 0.8); }
        .tl-yellow { background-color: #f39c12; box-shadow: 0 0 10px rgba(243, 156, 18, 0.8); }
        .tl-red { background-color: #d13438; box-shadow: 0 0 10px rgba(209, 52, 56, 0.8); }
        
        /* Блок статистики */
        .stats-grid { display: flex; gap: 15px; justify-content: space-between; margin-bottom: 15px; }
        .stat-box { flex: 1; background: rgba(0, 120, 215, 0.1); padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 120, 215, 0.3); text-align: center; }
        .stat-box span { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box b { font-size: 1.8rem; color: #0078d7; }
        .stat-danger b { color: #d13438; }
        
        /* Посещаемость */
        .att-cell { width: 28px; height: 28px; margin: 0 auto; border-radius: 6px; border: 1px solid var(--border-color); transition: 0.2s; }
        .att-0 { background-color: transparent; } .att-1 { background-color: #107c10; } .att-2 { background-color: #f39c12; } .att-3 { background-color: #d13438; }
        .att-interactive { cursor: pointer; } .att-interactive:hover { transform: scale(1.1); }
        
        /* Админ-панель */
        .admin-panel { background-color: var(--panel-bg); padding: 20px; border-left: 5px solid #0078d7; display: flex; flex-wrap: wrap; gap: 20px; border-radius: 0 12px 12px 0; margin-top: 20px;}
        .admin-section { flex: 1; min-width: 250px; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .input-group input { max-width: 80px; padding: 6px; text-align: right; border-radius: 4px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); }
        .hidden { display: none !important; }

        /* --- CSS УВЕДОМЛЕНИЙ --- */
        #toastContainer {
            position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 10000;
        }
        .toast {
            background: rgba(45, 45, 48, 0.95); backdrop-filter: blur(10px); border-left: 5px solid #0078d7; 
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 15px 20px; 
            display: flex; align-items: center; gap: 15px; color: white; font-weight: 500; font-size: 1rem; 
            animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; max-width: 400px;
        }
        [data-theme="light"] .toast { background: rgba(255, 255, 255, 0.95); color: #222; }
        .toast img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <div class="dashboard-container">
        <div class="header">
            <h1>TIGER CRM</h1>
            <div style="display:flex; gap: 15px;">
                <button id="themeToggle" class="btn-theme" onclick="toggleTheme()">☀️</button>
                <div class="user-badge">
                    <span id="displayUsername" style="color:#0078d7; font-weight:bold;">Loading...</span>
                    <button class="btn-logout" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="col-left">
                <div class="stats-grid">
                    <div class="stat-box"><span>Сотрудников в штате</span><b id="statCount">0</b></div>
                    <div class="stat-box stat-danger"><span>Отсутствий за неделю</span><b id="statAbsences">0</b></div>
                    <div class="stat-box"><span>План отдела (неделя)</span><b id="statPlanTotal">0</b></div>
                </div>

                <div class="panel">
                    <h3 class="panel-title">Реестр сотрудников и данные</h3>
                    <table>
                        <thead>
                            <tr>
                                <th style="width:15%">ID</th><th style="width:20%">Имя</th>
                                <th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th>
                                <th title="Эффективность к недельному плану">Эфф-ть</th><th>Общ</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h3 class="panel-title">Посещаемость сотрудников</h3>
                    <table>
                        <thead>
                            <tr>
                                <th style="width:15%">ID</th><th style="width:20%">Имя</th>
                                <th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-right">
                <div class="panel">
                    <h3 class="panel-title">Глобальное распределение</h3>
                    <div style="height: 200px;"><canvas id="globalChart"></canvas></div>
                </div>

                <div class="panel">
                    <h3 class="panel-title">Лидеры по данным</h3>
                    <div style="height: 250px;"><canvas id="barChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-section">
                <h3 style="color:var(--text-muted); border-bottom:1px solid var(--border-color); padding-bottom:10px;">Эффективность (План)</h3>
                <div class="input-group"><label>Цель на день (на чел.):</label><input type="number" id="planDaily" onchange="updatePlans()"></div>
                <div class="input-group"><label>Цель на неделю (на чел.):</label><input type="number" id="planWeekly" onchange="updatePlans()"></div>
            </div>
            <div class="admin-section">
                <h3 style="color:var(--text-muted); border-bottom:1px solid var(--border-color); padding-bottom:10px;">Глобальные распределения</h3>
                <div class="input-group"><label>Общее количество:</label><input type="number" id="globalTotal" onchange="uploadGlobalMetrics()"></div>
                <div class="input-group"><label>Жёлтые Воды:</label><input type="number" id="globalZV" onchange="uploadGlobalMetrics()"></div>
                <div class="input-group"><label>Никополь:</label><input type="number" id="globalNikopol" onchange="uploadGlobalMetrics()"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        tsParticles.load("tsparticles", { particles: { number: { value: 40 }, color: { value: "#888888" }, links: { enable: true, distance: 150, opacity: 0.2 }, move: { enable: true, speed: 0.5 } } });

        const SUPABASE_URL = "https://geolvowpvdxnimypcvfx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NYYVxFGX8ZnVK0CyEFPehg_z58eWBut"; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isAdmin = false;
        let employees = [];
        let metricsData = { daily_plan: 26, weekly_plan: 130 }; 
        let barChartInst = null;
        let globalChartInst = null;
        const dbDaysKeys = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        // Звук для уведомлений
        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function showNotification(message, imgUrl) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<img src="${imgUrl}" alt="cat"><div>${message}</div>`;
            container.appendChild(toast);
            
            notifySound.play().catch(e => console.log("Браузер заблокировал автовоспроизведение звука", e));

            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.5s forwards';
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }

        // Проверка времени для перерывов
        function checkTimeNotifications() {
            const now = new Date();
            const currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const today = now.toDateString();

            const times = {
                '10:30': { msg: 'Перерывчик!', img: 'https://cdn-icons-png.flaticon.com/512/1055/1055660.png' },
                '13:20': { msg: 'А как бы шо-то обэда будет, а то там 25 людей не кормленные...', img: 'https://cdn-icons-png.flaticon.com/512/1864/1864514.png' },
                '16:00': { msg: 'Перерывчик!', img: 'https://cdn-icons-png.flaticon.com/512/1055/1055660.png' }
            };

            if (times[currentTime]) {
                const flagKey = `notified_time_${currentTime}_${today}`;
                if (!localStorage.getItem(flagKey)) {
                    showNotification(times[currentTime].msg, times[currentTime].img);
                    localStorage.setItem(flagKey, 'true');
                }
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('crm_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeToggle').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('crm_theme', newTheme);
            document.getElementById('themeToggle').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        }

        async function loadCloudData() {
            let { data: metrics } = await db.from('global_metrics').select('*').eq('id', 1).single();
            if (metrics) {
                metricsData = metrics;
                document.getElementById('globalTotal').value = metrics.total || 0;
                document.getElementById('globalZV').value = metrics.zv || 0;
                document.getElementById('globalNikopol').value = metrics.nikopol || 0;
                
                document.getElementById('planDaily').value = metrics.daily_plan || 26;
                document.getElementById('planWeekly').value = metrics.weekly_plan || 130;
                metricsData.weekly_plan = metrics.weekly_plan || 130;
            }

            let { data: dbEmployees } = await db.from('employees').select('*').order('created_at', { ascending: true });
            if (dbEmployees) {
                employees = dbEmployees.map(emp => ({
                    id: emp.id, name: emp.name, 
                    days: [emp.mon, emp.tue, emp.wed, emp.thu, emp.fri, emp.sat],
                    attendance: [emp.att_mon, emp.att_tue, emp.att_wed, emp.att_thu, emp.att_fri, emp.att_sat]
                }));
            }
            renderAll();
        }

        async function updatePlans() {
            if(!isAdmin) return;
            const daily = parseInt(document.getElementById('planDaily').value) || 26;
            const weekly = parseInt(document.getElementById('planWeekly').value) || 130;
            metricsData.daily_plan = daily; metricsData.weekly_plan = weekly;
            renderAll();
            await db.from('global_metrics').update({ daily_plan: daily, weekly_plan: weekly }).eq('id', 1);
        }

        async function uploadGlobalMetrics() {
            if(!isAdmin) return;
            const t = parseInt(document.getElementById('globalTotal').value) || 0;
            const z = parseInt(document.getElementById('globalZV').value) || 0;
            const n = parseInt(document.getElementById('globalNikopol').value) || 0;
            
            metricsData.total = t; metricsData.zv = z; metricsData.nikopol = n;
            updateCharts(); 

            await db.from('global_metrics').update({ total: t, zv: z, nikopol: n }).eq('id', 1);
        }

        function renderAll() {
            const tBodyData = document.getElementById('employeeTableBody');
            const tBodyAtt = document.getElementById('attendanceTableBody');
            tBodyData.innerHTML = ''; tBodyAtt.innerHTML = '';
            
            let totalAbsences = 0;
            let currentGlobalSum = 0;
            const today = new Date().toDateString();
            
            employees.forEach((emp, index) => {
                totalAbsences += emp.attendance.filter(a => a === 3).length;
                
                let totalData = emp.days.reduce((a, b) => (a||0) + (b||0), 0);
                currentGlobalSum += totalData;
                let disabledAttr = isAdmin ? '' : 'disabled';
                
                // === ПРОВЕРКА УВЕДОМЛЕНИЙ ===
                if (totalData >= 5 && !localStorage.getItem(`evt_5_${emp.id}_${today}`)) {
                    showNotification(`У ${emp.name} уже 5 данных, круто!`, 'https://cdn-icons-png.flaticon.com/512/3573/3573974.png');
                    localStorage.setItem(`evt_5_${emp.id}_${today}`, 'true');
                }
                if (totalData >= 10 && !localStorage.getItem(`evt_10_${emp.id}_${today}`)) {
                    showNotification(`У ${emp.name} уже 10 данных, вот это нифига себе!!!`, 'https://cdn-icons-png.flaticon.com/512/1055/1055684.png');
                    localStorage.setItem(`evt_10_${emp.id}_${today}`, 'true');
                }
                
                let planTarget = metricsData.weekly_plan;
                let percent = (totalData / planTarget) * 100;
                let tlClass = 'tl-red';
                if (percent >= 100) tlClass = 'tl-green';
                else if (percent >= 75) tlClass = 'tl-yellow';

                let trData = document.createElement('tr');
                trData.innerHTML = `<td style="color:#0078d7;font-family:monospace;font-size:0.85rem;">${emp.id}</td><td>${emp.name}</td>` + 
                    emp.days.map((val, dIdx) => `<td><input type="number" class="cell-input" value="${val||0}" onchange="updateEmpDay(${index}, ${dIdx}, this.value)" ${disabledAttr}></td>`).join('') +
                    `<td><div class="traffic-light ${tlClass}" title="${Math.round(percent)}% от плана"></div></td>` +
                    `<td style="font-weight:bold;color:#107c10;">${totalData}</td>`;
                tBodyData.appendChild(trData);

                let trAtt = document.createElement('tr');
                let attHtml = `<td style="color:#0078d7;font-family:monospace;font-size:0.85rem;">${emp.id}</td><td>${emp.name}</td>`;
                emp.attendance.forEach((st, dIdx) => {
                    let interactive = isAdmin ? 'att-interactive' : '';
                    let onClick = isAdmin ? `onclick="toggleAtt(${index}, ${dIdx})"` : '';
                    attHtml += `<td><div class="att-cell att-${st||0} ${interactive}" ${onClick}></div></td>`;
                });
                trAtt.innerHTML = attHtml;
                tBodyAtt.appendChild(trAtt);
            });

            // === ПРОВЕРКА ГЛОБАЛЬНОГО УВЕДОМЛЕНИЯ ===
            if (currentGlobalSum >= 50 && !localStorage.getItem(`evt_global_50_${today}`)) {
                showNotification(`Достигнуто общее 50 кол-во данных за день!`, 'https://cdn-icons-png.flaticon.com/512/3573/3573977.png');
                localStorage.setItem(`evt_global_50_${today}`, 'true');
            }

            document.getElementById('statCount').innerText = employees.length;
            document.getElementById('statAbsences').innerText = totalAbsences;
            document.getElementById('statPlanTotal').innerText = employees.length * (metricsData.weekly_plan || 130);

            updateCharts();
        }

        async function updateEmpDay(eIdx, dIdx, val) {
            if(!isAdmin) return;
            const v = parseInt(val) || 0;
            employees[eIdx].days[dIdx] = v;
            renderAll();
            await db.from('employees').update({ [dbDaysKeys[dIdx]]: v }).eq('id', employees[eIdx].id);
        }

        async function toggleAtt(eIdx, dIdx) {
            if(!isAdmin) return;
            let current = employees[eIdx].attendance[dIdx] || 0;
            let next = (current + 1) % 4; 
            employees[eIdx].attendance[dIdx] = next;
            renderAll();
            const keys = ['att_mon', 'att_tue', 'att_wed', 'att_thu', 'att_fri', 'att_sat'];
            await db.from('employees').update({ [keys[dIdx]]: next }).eq('id', employees[eIdx].id);
        }

        function updateCharts() {
            if(!barChartInst) {
                barChartInst = new Chart(document.getElementById('barChart'), {
                    type: 'bar', data: { labels: [], datasets: [{ label: 'Объем', data: [], backgroundColor: '#0078d7', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }
            barChartInst.data.labels = employees.map(e => e.name);
            barChartInst.data.datasets[0].data = employees.map(e => e.days.reduce((a,b)=>a+b,0));
            barChartInst.update();

            // Глобальное распределение (Полукруг)
            if(!globalChartInst) {
                globalChartInst = new Chart(document.getElementById('globalChart'), {
                    type: 'doughnut', 
                    data: { 
                        labels: ['Жёлтые Воды', 'Никополь', 'Каменское'], 
                        datasets: [{ 
                            data: [0, 0, 0], 
                            backgroundColor: ['#f39c12', '#0078d7', '#27ae60'], 
                            borderWidth: 0 
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        rotation: -90,
                        circumference: 180,
                        plugins: { 
                            legend: { position: 'bottom', labels: { color: '#aaaaaa' } } 
                        } 
                    }
                });
            }
            
            let zv = metricsData.zv || 0;
            let niko = metricsData.nikopol || 0;
            let total = metricsData.total || 0;
            let kamianske = total - (zv + niko);
            
            globalChartInst.data.datasets[0].data = [zv, niko, kamianske > 0 ? kamianske : 0];
            globalChartInst.update();
        }

        function logout() { localStorage.removeItem('crm_role'); window.location.href = 'login.html'; }

        window.onload = async () => { 
            initTheme();
            if (!localStorage.getItem('crm_role')) { window.location.href = 'login.html'; return; }
            document.getElementById('displayUsername').innerText = `${localStorage.getItem('crm_username')} [${localStorage.getItem('crm_role').toUpperCase()}]`;
            isAdmin = localStorage.getItem('crm_role') === 'admin';
            if (isAdmin) document.getElementById('adminPanel').classList.remove('hidden');
            await loadCloudData(); 
            
            // Запускаем проверку времени каждые 30 секунд
            setInterval(checkTimeNotifications, 30000);
            
            db.channel('realtime-sync')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' }, () => {
                  if (document.activeElement?.tagName !== 'INPUT') loadCloudData();
              })
              .on('postgres_changes', { event: '*', schema: 'public', table: 'global_metrics' }, () => {
                  if (document.activeElement?.tagName !== 'INPUT') loadCloudData();
              })
              .subscribe();
        };
    </script>
</body>
</html>
